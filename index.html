<header>Getting Started in HAM Radio — 2026</header>
<h2 id="what-is-rtl-sdr">What is RTL-SDR?</h2>
<p>A <strong>Software-Defined Radio</strong> dongle originally designed for digital TV that was repurposed into a wideband radio receiver.</p>
<ul>
<li><strong>Hardware:</strong> USB dongle with an antenna, ~$30–35 USD</li>
<li><strong>Current standard:</strong> RTL-SDR Blog V4 (2023+)</li>
<li><strong>Frequency range:</strong> ~500 kHz – 1.75 GHz (nearly everything!)</li>
<li><strong>No transmit</strong> — receive only — <em>no license required</em></li>
</ul>
<h3 id="why-start-here">Why start here?</h3>
<p>Before you transmit, <em>listen</em>. SDR lets you:</p>
<ul>
<li>Explore the radio spectrum visually</li>
<li>Hear conversations on every mode</li>
<li>Understand what HAM radio actually sounds like</li>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="rtl-sdr-what-can-you-receive">RTL-SDR: What Can You Receive?</h2>
<table>
<thead>
<tr>
<th>Band / Service</th>
<th>What You'll Hear</th>
</tr>
</thead>
<tbody>
<tr>
<td>FM Broadcast</td>
<td>87.5–108 MHz stereo music &amp; RDS data</td>
</tr>
<tr>
<td>Aircraft (ADS-B)</td>
<td>1090 MHz — live flight positions</td>
</tr>
<tr>
<td>Weather Satellites</td>
<td>NOAA APT images from space (137 MHz)</td>
</tr>
<tr>
<td>2m HAM</td>
<td>Local FM repeaters, simplex chats</td>
</tr>
<tr>
<td>70cm HAM</td>
<td>Digital voice (DMR, C4FM), repeaters</td>
</tr>
<tr>
<td>FRS/GMRS</td>
<td>Walkie-talkie conversations</td>
</tr>
<tr>
<td>APRS</td>
<td>144.390 MHz — GPS tracking &amp; text</td>
</tr>
<tr>
<td>Police/Fire</td>
<td>(Clear channels vary by region)</td>
</tr>
<tr>
<td>Trunked Radio</td>
<td>P25, DMR trunked systems</td>
</tr>
<tr>
<td>Pagers</td>
<td>FLEX, POCSAG — yes, still running</td>
</tr>
<tr>
<td>ISS</td>
<td>Packet, voice, SSTV events</td>
</tr>
</tbody>
</table>

<li>A laptop or Raspberry Pi 4/5</li>
</ol>
<h3 id="first-steps">First steps:</h3>
<ol>
<li>Plug in dongle, install SDR++</li>
<li>Open SDR++, set sample rate to 2.4 MSPS</li>
<li>Tune to <strong>144.390 MHz</strong> — watch APRS packets appear</li>
<li>Tune to <strong>1090 MHz</strong>, run dump1090 — see aircraft on a map</li>
<li>Find your local <strong>2m FM repeater</strong> — listen to actual HAM conversations</li>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="frs--family-radio-service">FRS — Family Radio Service</h2>
<p><strong>FRS is a free, license-by-rule service for everyone in the US.</strong></p>
<h3 id="the-basics">The basics:</h3>
<ul>
<li><strong>22 channels</strong> shared with GMRS (Ch 1–22)</li>
<li><strong>Power limits:</strong> 0.5W on channels 8–14 (shared with GMRS), up to <strong>2W</strong> on FRS-only channels 1–7 and 15–22</li>
<li><strong>No repeater access</strong> — simplex only</li>
<li><strong>Fixed antennas only</strong> — the little bubble-pack radios</li>
</ul>
<h3 id="use-cases">Use cases:</h3>
<ul>
<li>Family events, hiking, camping, theme parks</li>
<li>Event coordination, neighborhood watch</li>
<li>Gateway drug to radio — most people have used these</li>
</ul>
<h3 id="hardware">Hardware:</h3>
<ul>
<li>Motorola T600, Midland GXT1000, Baofeng FRS variants</li>
<li>$20–60 for a pair at Walmart or Amazon</li>
<li><strong>Limitation:</strong> Short range, crowded channels, no privacy (it's radio!)</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="meshcore--off-grid-mesh-networking">MeshCore — Off-Grid Mesh Networking</h2>
<p><strong>The most exciting unlicensed radio technology right now.</strong></p>
<h3 id="what-is-meshcore">What is MeshCore?</h3>
<ul>
<li><strong>LoRa-based</strong> mesh radio network</li>
<li>Uses <strong>ISM bands</strong> (915 MHz in US, 868 MHz EU) — <em>no license required</em></li>
<li>Long range: <strong>1–30+ km</strong> per node, longer with elevation</li>
<li><strong>Text messaging, GPS position sharing, telemetry</strong></li>
<li>Self-healing mesh — packets route around failures</li>
</ul>
<h3 id="meshcore-vs-meshtastic">MeshCore vs. Meshtastic:</h3>
<table>
<thead>
<tr>
<th>Feature</th>
<th>MeshCore</th>
<th>Meshtastic</th>
</tr>
</thead>
<tbody>
<tr>

<h2 id="meshcore-hardware--getting-started">MeshCore: Hardware &amp; Getting Started</h2>
<h3 id="supported-hardware-25%E2%80%9360">Supported Hardware (~$25–60):</h3>

</ul>

<ol>

<li>Flash MeshCore firmware (or Meshtastic)</li>

<li>Start messaging with anyone else on the mesh nearby</li>
</ol>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="beyond-frs-and-meshcore">Beyond FRS and MeshCore</h2>
<h3 id="other-unlicensed-radio-options">Other unlicensed radio options:</h3>
<p><strong>MURS (Multi-Use Radio Service)</strong></p>
<ul>
<li>5 channels in VHF (151–154 MHz)</li>
<li>Up to 2W, no repeaters</li>
<li>Better range than FRS in some environments</li>
</ul>
<p><strong>CB Radio (Citizens Band)</strong></p>
<ul>
<li>40 channels at 27 MHz</li>
<li>Up to 4W AM, 12W SSB (legal)</li>
<li>Truckers, off-roading, skip DX on AM</li>
<li>Still a legit community in 2026</li>
</ul>
<p><strong>Wi-Fi &amp; Bluetooth</strong> — technically radio, FCC Part 15</p>
<h3 id="the-unlicensed-ladder">The unlicensed ladder:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Listen (RTL-SDR) → FRS → MeshCore/Meshtastic → GMRS → HAM
</code></pre>
<p>Each step builds skills and appreciation for the radio hobby.<br />
No step is mandatory — but each one opens new doors.</p>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="what-is-gmrs">What is GMRS?</h2>
<p><strong>GMRS is a licensed radio service that covers your whole family for $35.</strong></p>
<h3 id="the-deal">The deal:</h3>
<ul>
<li><strong>$35 FCC license fee</strong> — valid for <strong>10 years</strong></li>
<li>Covers your <strong>immediate family</strong> (spouse, children, parents, siblings)</li>
<li>No exam required — just pay the fee at the FCC ULS</li>
<li>Use <strong>up to 50W</strong> output power (handhelds are typically 5W)</li>
<li><strong>Repeater access</strong> — dramatically extends range</li>
</ul>
<h3 id="gmrs-channels">GMRS Channels:</h3>
<table>
<thead>
<tr>
<th>Type</th>
<th>Channels</th>
<th>Power</th>
</tr>
</thead>
<tbody>
<tr>
<td>FRS/GMRS shared</td>
<td>1–7, 15–22</td>
<td>Up to 50W GMRS</td>
</tr>
<tr>
<td>GMRS simplex</td>
<td>15–22</td>
<td>Up to 50W</td>
</tr>
<tr>
<td><strong>GMRS repeater pairs</strong></td>
<td><strong>15R–22R</strong></td>
<td>Up to 50W</td>
</tr>
<tr>
<td>Shared FRS only</td>
<td>8–14</td>
<td>0.5W max</td>
</tr>
</tbody>
</table>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="gmrs-why-it-matters">GMRS: Why It Matters</h2>
<h3 id="range">Range:</h3>
<ul>
<li><strong>Handhelds (5W):</strong> 3–10 km, much more with elevation</li>
<li><strong>Mobile/base (50W):</strong> 30+ km line of sight</li>
<li><strong>Through a repeater:</strong> 80–160 km radius is common</li>
</ul>
<h3 id="gmrs-repeaters">GMRS Repeaters:</h3>
<ul>
<li>Run by clubs and individuals, often free to use</li>
<li><code>mygmrs.com</code> — national repeater directory</li>
<li>Some repeaters linked over internet (IRLP/AllStar/Zello-based)</li>
<li>Growing infrastructure in 2026</li>
</ul>
<h3 id="the-gmrs-community-is-growing">The GMRS community is growing:</h3>
<ul>
<li>Many preppers, off-road/overlanding groups, RV communities</li>
<li>Neighborhood emergency communication groups</li>
<li>Affordable hardware: Midland MXT, BTech GMRS-50X1, Radioddity GM30</li>
</ul>
<blockquote>
<p>GMRS is the <strong>best-kept secret</strong> in radio for families and community groups</p>
</blockquote>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="gmrs-%E2%86%92-ham-skills-that-transfer">GMRS → HAM: Skills That Transfer</h2>
<p>GMRS gives you practical radio experience before taking the HAM exam.</p>
<h3 id="skills-that-carry-over-directly">Skills that carry over directly:</h3>
<ul>
<li>Understanding repeaters (inputs, outputs, CTCSS tones)</li>
<li>Radio operating procedures and etiquette</li>
<li>Antenna and coax fundamentals</li>
<li>Emergency communications mentality</li>
</ul>
<blockquote>
<p>Many operators hold <strong>both</strong> GMRS and HAM licenses — they complement each other</p>
</blockquote>

<h2 id="the-three-license-levels">The Three License Levels</h2>
<p><strong>All three require written exams. No Morse code required (since 2007).</strong></p>
<h3 id="license-overview">License overview:</h3>
<table>
<thead>
<tr>
<th>License</th>
<th style="text-align:center">Questions</th>
<th style="text-align:center">Pool Size</th>
<th style="text-align:center">Need Correct</th>
<th>Focus</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Technician</strong></td>
<td style="text-align:center">35</td>
<td style="text-align:center">423</td>
<td style="text-align:center">26 (74%)</td>
<td>VHF/UHF, basics</td>
</tr>
<tr>
<td><strong>General</strong></td>
<td style="text-align:center">35</td>
<td style="text-align:center">454</td>
<td style="text-align:center">26 (74%)</td>
<td>HF privileges</td>
</tr>
<tr>
<td><strong>Extra</strong></td>
<td style="text-align:center">50</td>
<td style="text-align:center">622</td>
<td style="text-align:center">37 (74%)</td>
<td>Full privileges</td>
</tr>
</tbody>
</table>
<h3 id="the-progression">The progression:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>No license → Technician → General → Extra
</code></pre>
<ul>
<li>You must hold each license to upgrade to the next</li>
<li>Many operators stay at Technician or General for years</li>
<li>There's no rush — <strong>start where you are</strong></li>
</ul>
<blockquote>
<p>License pools are updated every 4 years. Study from current materials!</p>
</blockquote>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="technician-license">Technician License</h2>
<p><strong>The entry point to amateur radio.</strong></p>
<h3 id="what-you-get">What you get:</h3>
<ul>
<li>All amateur privileges <strong>above 30 MHz</strong> (VHF/UHF and higher)</li>
<li><strong>2 meters (144–148 MHz):</strong> FM simplex, repeaters, APRS, satellite</li>
<li><strong>70 cm (420–450 MHz):</strong> FM, digital voice (DMR, C4FM, D-STAR), repeaters</li>
<li><strong>6 meters (50–54 MHz):</strong> &quot;Magic band,&quot; occasional long-distance contacts</li>
<li><strong>Limited HF:</strong> 10 meters (28 MHz) — some phone/data/CW privileges</li>
<li><strong>Other bands:</strong> 1.25m, 33cm, 23cm, and microwave allocations</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="general-license">General License</h2>
<p><strong>Unlocks the HF shortwave bands — global communication.</strong></p>
<h3 id="new-privileges-over-technician">New privileges over Technician:</h3>
<ul>
<li><strong>80 meters (3.5–4 MHz):</strong> Nighttime DX, regional nets</li>
<li><strong>40 meters (7 MHz):</strong> Most popular HF band, day and night</li>
<li><strong>15 meters (21 MHz):</strong> Excellent when solar cycle is active</li>
<li><strong>10 meters (28 MHz):</strong> Full phone privileges (vs. limited Tech)</li>
<li><strong>17m, 12m:</strong> Excellent DX bands</li>
<li><em>Partial access to 160m, 60m, 30m, 20m</em></li>
</ul>
</section>

<h2 id="general-license-why-upgrade">General License: Why Upgrade?</h2>
<h3 id="why-upgrade">Why upgrade?</h3>
<ul>
<li><strong>20 meters (14 MHz)</strong> is the most active global HF band</li>
<li>Talk to every continent with modest equipment</li>
<li>Join HF nets, participate in DX contests</li>
<li>Winlink email over HF for emergency use</li>
</ul>

</ul>

<h2 id="extra-license">Extra License</h2>
<p><strong>Full amateur privileges — the complete picture.</strong></p>
<h3 id="new-privileges-over-general">New privileges over General:</h3>

<li><strong>Extra-class sub-bands</strong> on all HF bands (less crowded!)</li>

</ul>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="how-to-study-for-your-license">How to Study for Your License</h2>
<h3 id="study-resources">Study resources:</h3>
<ul>
<li><strong>HamStudy.org</strong> — free, adaptive spaced repetition, highly recommended</li>
<li><strong>ARRL Ham Radio License Manual</strong> — official study guide</li>
<li><strong>HamTestOnline.com</strong> — paid but very thorough</li>
<li><strong>YouTube:</strong> Ham Radio Crash Course, David Casler (KE0OG) study videos</li>
</ul>
<h3 id="study-strategy">Study strategy:</h3>
<ul>
<li>20–30 minutes/day on HamStudy flashcards</li>
<li>Take full practice exams once you know most material</li>
<li>Aim to score <strong>80%+ consistently</strong> before scheduling your test</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="taking-the-exam">Taking the Exam</h2>
<h3 id="steps">Steps:</h3>
<ol>
<li>Find a <strong>Volunteer Examiner session</strong> near you
<ul>
<li><code>arrl.org/find-an-amateur-radio-license-exam-session</code></li>
<li><strong>Remote/online testing</strong> via HamStudy ARRL VEC or W5YI</li>
</ul>
</li>
<li>Bring a photo ID and $15–20 exam fee (varies by VEC)</li>
<li>Pass 26/35 questions (74%)</li>
<li>Callsign appears in FCC ULS within <strong>1–10 business days</strong></li>
<li>You can operate as soon as your callsign is in the database!</li>
</ol>
<h3 id="pro-tips">Pro tips:</h3>
<ul>
<li>Many clubs offer free <strong>Elmer</strong> (mentoring) programs</li>
<li>Consider testing for <strong>all three licenses in one sitting</strong> —<br />
the fee is often the same, and you can test up immediately after each pass</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="your-callsign">Your Callsign</h2>
<p><strong>Your callsign is your radio identity — for life if you want it.</strong></p>
<h3 id="how-callsigns-are-assigned-in-the-us">How callsigns are assigned in the US:</h3>
<ul>
<li><strong>1x2 format:</strong> <code>W1XY</code> — Extra class (sequential or vanity)</li>
<li><strong>2x1 format:</strong> <code>KD9Y</code> — older or vanity</li>
<li><strong>2x2 format:</strong> <code>KD9YZ</code> — General or Technician, most new licenses</li>
<li><strong>2x3 format:</strong> <code>KD9ABC</code> — newer assignments</li>
</ul>
<h3 id="vanity-callsigns">Vanity callsigns:</h3>
<ul>
<li>Apply after licensing for a specific callsign via FCC ULS</li>
<li>Free to apply, small wait period</li>
<li>Can request 1x2, 2x1 (if Extra) or any available combination</li>
<li>Many operators pick meaningful callsigns</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="understanding-modes">Understanding Modes</h2>
<p><strong>A &quot;mode&quot; is how information is encoded onto a radio signal.</strong></p>
<h3 id="the-three-fundamental-categories">The three fundamental categories:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>ANALOG VOICE          DIGITAL VOICE         DATA / WEAK SIGNAL
─────────────         ─────────────         ──────────────────
FM (Frequency Mod)    DMR                   CW (Morse)
AM (Amplitude Mod)    D-STAR                FT8 / FT4
SSB (Single Sideband) C4FM / Fusion         JS8Call
                      M-17                  RTTY
                      FreeDV (hybrid)       VARA / Winlink
                                            APRS
                                            PSK31
</code></pre>
<h3 id="why-does-this-matter">Why does this matter?</h3>
<p>Different modes excel at different things:</p>
<ul>
<li><strong>FM</strong> — clear voice, simple hardware, short range</li>
<li><strong>SSB</strong> — long range voice with modest power</li>
<li><strong>FT8</strong> — contacts at the noise floor, automated</li>
<li><strong>VARA</strong> — robust data transfer over poor HF paths</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="fm--the-starter-mode">FM — The Starter Mode</h2>
<p><strong>Most Technician operators begin on FM.</strong></p>
<h3 id="how-fm-works">How FM works:</h3>
<ul>
<li><strong>Frequency Modulation</strong> — voice varies the carrier frequency</li>
<li>Clean, full-quieting audio when signal is strong</li>
<li>Cliff-edge reception: crystal clear when strong, noise floor when weak</li>
</ul>
<h3 id="2-meter-fm-144%E2%80%93148-mhz">2-meter FM (144–148 MHz):</h3>
<ul>
<li>Most active HAM band for new operators</li>
<li><strong>Repeaters everywhere</strong> — extend handheld range to 30–100+ km</li>
<li>Repeater directories: <code>repeaterbook.com</code></li>
<li><strong>CTCSS/DCS tones</strong> — subaudible tones to access repeaters</li>
</ul>
<h3 id="70cm-fm-420%E2%80%93450-mhz">70cm FM (420–450 MHz):</h3>
<ul>
<li>Less congested than 2m in many areas</li>
<li>Digital voice repeaters (DMR, C4FM) are common on 70cm</li>
</ul>
</section>

<h3 id="recommended-first-radios">Recommended first radios:</h3>
<ul>

</ul>
<h3 id="first-steps-on-fm">First steps on FM:</h3>
<ol>
<li>Program your local repeater into the radio (input, output, CTCSS tone)</li>
<li>Listen to the repeater during commute hours — most active time</li>
<li>Wait for a break, key up, say your callsign</li>
<li>Someone will likely come back — that's your first contact!</li>
</ol>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ssb--single-sideband">SSB — Single Sideband</h2>
<p><strong>The workhorse of HF communication.</strong></p>
<h3 id="the-physics">The physics:</h3>
<ul>
<li>AM has two sidebands + carrier — SSB strips one sideband and the carrier</li>
<li><strong>~6 dB gain</strong> in effective power over AM</li>
<li><strong>More efficient bandwidth</strong> — fits more contacts in same spectrum</li>
<li>Sounds &quot;choppy&quot; to untrained ears but crystal clear once you tune it</li>
</ul>
<h3 id="lsb-vs-usb">LSB vs USB:</h3>
<ul>
<li><strong>LSB (Lower Sideband):</strong> 40m, 80m, 160m — <em>&quot;Lower bands, Lower sideband&quot;</em></li>
<li><strong>USB (Upper Sideband):</strong> 20m, 17m, 15m, 12m, 10m, 6m, VHF/UHF</li>
</ul>
<h3 id="why-ssb">Why SSB?</h3>
<ul>
<li><strong>DX</strong> — talking across continents with 100W or less</li>
<li><strong>QRP</strong> — 5W or less — global contacts are achievable</li>
<li><strong>Emergency communications</strong> — reliable when infrastructure is gone</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ssb-equipment">SSB: Equipment</h2>
<h3 id="entry-level-hf-transceivers">Entry-level HF transceivers:</h3>
<ul>
<li><strong>Icom IC-7300</strong> — the gold standard entry rig (~$1,100), SDR-based</li>
<li><strong>Xiegu G90</strong> — budget SDR-based HF radio (~$400), excellent value</li>
<li><strong>Icom IC-705</strong> — portable, all-mode, SDR-based (~$1,300)</li>
<li><strong>Yaesu FT-991A</strong> — all-band all-mode including VHF/UHF (~$1,100)</li>
</ul>
<h3 id="what-you-need-besides-the-radio">What you need besides the radio:</h3>
<ul>
<li><strong>Antenna</strong> — a simple wire dipole works fine to start</li>
<li><strong>Feedline</strong> — coax (RG-8X or LMR-400 for longer runs)</li>
<li><strong>Interface</strong> — for digital modes: Digirig (~$60) or SignaLink (~$120)</li>
<li><strong>Logging software</strong> — N1MM+, Log4OM, or WSJT-X (free)</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ft8--the-digital-phenomenon">FT8 — The Digital Phenomenon</h2>
<p><strong>FT8 changed HF amateur radio forever when released in 2017.</strong></p>
<h3 id="what-is-ft8">What is FT8?</h3>
<ul>
<li><strong>Frequency-shift keying</strong> digital mode by K1JT and K9AN</li>
<li>15-second transmission cycles (FT4 = 7.5 seconds)</li>
<li>Extreme weak-signal performance: contacts at <strong>-20 dB SNR</strong></li>
<li>Fully automated logging possible via WSJT-X software</li>
</ul>
<h3 id="the-workflow">The workflow:</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Open WSJT-X → Tune to FT8 frequency → Watch decodes appear
→ Double-click a station → Exchange automated → Log confirmed contact
</code></pre>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ft8-why-it-changed-everything">FT8: Why It Changed Everything</h2>
<h3 id="why-its-revolutionary">Why it's revolutionary:</h3>
<ul>
<li>QRP (5W) contacts to Europe from a wire antenna in a small yard</li>
<li>Opens up HF for people with HOA antenna restrictions</li>
<li>Proves a contact is possible when voice conditions are too poor</li>
<li>Massive uptake: FT8 is now <strong>the most popular HF data mode</strong></li>
</ul>
<h3 id="the-controversy">The controversy:</h3>
<blockquote>
<p>&quot;It's not <em>real</em> radio — a computer does everything!&quot;<br />
vs.<br />
&quot;It's the most efficient use of spectrum ever devised.&quot;</p>
</blockquote>
<p>Both sides have a point. FT8 is a tool — use it to <em>get on HF</em>, then explore.</p>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="js8call--aprs">JS8Call &amp; APRS</h2>
<h3 id="js8call--keyboard-ft8">JS8Call — Keyboard FT8</h3>
<ul>
<li>Based on FT8 encoding, but <strong>human-typed messages</strong></li>
<li>Much slower but conversational</li>
<li>SNR performance nearly as good as FT8</li>
<li><strong>Emergency/resilience use:</strong> store-and-forward, relay mode</li>
<li>Great for off-grid communities wanting text comms over HF</li>
</ul>
<h3 id="aprs--automatic-packet-reporting-system">APRS — Automatic Packet Reporting System</h3>
<ul>
<li><strong>144.390 MHz</strong> in North America (144.800 in EU)</li>
<li>GPS position beacons, weather data, text messages</li>
<li><code>aprs.fi</code> — live map of all APRS activity worldwide</li>
<li>Digipeaters extend range, I-Gates connect to internet</li>
<li>Supported in Kenwood, Yaesu, and virtually all modern radios</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="more-digital-data-modes">More Digital Data Modes</h2>
<h3 id="other-keyboard--data-modes">Other keyboard &amp; data modes:</h3>
<ul>
<li><strong>PSK31</strong> — classic keyboard-to-keyboard mode, very narrow bandwidth</li>
<li><strong>RTTY</strong> — radioteletype, still used in contesting</li>
<li><strong>Olivia</strong> — extremely robust keyboard chat in poor conditions</li>
<li><strong>WSPR</strong> — Weak Signal Propagation Reporter, beacon mode for testing</li>
</ul>
<h3 id="choosing-a-mode">Choosing a mode:</h3>
<table>
<thead>
<tr>
<th>Goal</th>
<th>Use</th>
</tr>
</thead>
<tbody>
<tr>
<td>Just get on HF fast</td>
<td>FT8</td>
</tr>
<tr>
<td>Chat with a person</td>
<td>JS8Call or PSK31</td>
</tr>
<tr>
<td>Track positions/weather</td>
<td>APRS</td>
</tr>
<tr>
<td>Map propagation</td>
<td>WSPR</td>
</tr>
<tr>
<td>Emergency email</td>
<td>VARA / Winlink</td>
</tr>
</tbody>
</table>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="vara--winlink">VARA &amp; Winlink</h2>
<p><strong>Email over radio — real, practical, emergency-proven.</strong></p>
<h3 id="winlink">Winlink:</h3>
<ul>
<li><strong>Email system</strong> that works entirely over radio</li>
<li>No internet required at the operator end</li>
<li>Used by <strong>ARES, RACES, Red Cross, Coast Guard, cruisers</strong></li>
<li>Access via HF (Pactor, VARA HF), VHF (VARA FM, Packet)</li>
</ul>
<h3 id="vara-hf--vara-fm">VARA HF &amp; VARA FM:</h3>
<ul>
<li><strong>VARA</strong> by EA5HVK — proprietary but free-to-use modem</li>
<li><strong>VARA HF:</strong> Adaptive HF data modem, 10–10,000 bps depending on conditions</li>
<li><strong>VARA FM:</strong> Fast local VHF/UHF data transfer, up to 9600 bps</li>
<li>Dramatically faster and more robust than older Pactor hardware modems</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="freedv--open-source-digital-voice-for-hf">FreeDV — Open Source Digital Voice for HF</h2>
<p><strong>The open alternative to proprietary digital voice on shortwave.</strong></p>
<h3 id="what-is-freedv">What is FreeDV?</h3>
<ul>
<li>Open source, open standard digital voice mode for HF</li>
<li>Uses <strong>Codec2</strong> — an open source voice codec by David Rowe (VK5DGR)</li>
<li>Modes: <strong>FreeDV 700D, 1600, 2020</strong> — different bandwidth/quality tradeoffs</li>
<li>Designed for HF propagation challenges — splatter-resistant, robust</li>
</ul>
<h3 id="why-it-matters">Why it matters:</h3>
<ul>
<li><strong>No proprietary hardware required</strong> — run on any SSB radio + PC</li>
<li>Codec2 is also used in M-17, the next-generation digital voice protocol</li>
<li>Community-driven development, fully documented</li>
<li>Outperforms SSB voice in poor conditions (some modes)</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="why-digital-voice">Why Digital Voice?</h2>
<p><strong>Digital voice encodes your voice as data — enabling new capabilities.</strong></p>
<h3 id="analog-fm-vs-digital-voice">Analog FM vs. Digital Voice:</h3>
<table>
<thead>
<tr>
<th>Feature</th>
<th style="text-align:center">Analog FM</th>
<th style="text-align:center">Digital Voice</th>
</tr>
</thead>
<tbody>
<tr>
<td>Audio clarity (strong signal)</td>
<td style="text-align:center">Excellent</td>
<td style="text-align:center">Very Good</td>
</tr>
<tr>
<td>Audio in poor conditions</td>
<td style="text-align:center">Degrades gracefully</td>
<td style="text-align:center">&quot;Cliff&quot; effect</td>
</tr>
<tr>
<td>Bandwidth</td>
<td style="text-align:center">~16 kHz</td>
<td style="text-align:center">~6–12 kHz</td>
</tr>
<tr>
<td>Two channels in one slot</td>
<td style="text-align:center">No</td>
<td style="text-align:center">Yes (DMR)</td>
</tr>
<tr>
<td>Internet linking</td>
<td style="text-align:center">Via repeater only</td>
<td style="text-align:center">Native (IPSC2, etc.)</td>
</tr>
<tr>
<td>Encryption (ham: not allowed)</td>
<td style="text-align:center">No</td>
<td style="text-align:center">Technically possible</td>
</tr>
<tr>
<td>GPS/data embedding</td>
<td style="text-align:center">No</td>
<td style="text-align:center">Yes</td>
</tr>
<tr>
<td>Callsign display</td>
<td style="text-align:center">No</td>
<td style="text-align:center">Yes</td>
</tr>
<tr>
<td>Talkgroups/rooms</td>
<td style="text-align:center">No</td>
<td style="text-align:center">Yes</td>
</tr>
</tbody>
</table>
<blockquote>
<p>The killer feature: <strong>worldwide talkgroups</strong> — talk to Japan from a $60 hotspot</p>
</blockquote>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="dmr--digital-mobile-radio">DMR — Digital Mobile Radio</h2>
<p><strong>The most widely deployed digital voice mode in amateur radio.</strong></p>
<h3 id="origins">Origins:</h3>
<ul>
<li>Commercial standard (ETSI), originally for business radio</li>
<li>Adopted by amateur radio community due to cheap hardware</li>
<li><strong>TDMA</strong> — 2 time slots on one 12.5 kHz channel</li>
</ul>
<h3 id="dmr-networks">DMR Networks:</h3>
<ul>
<li><strong>Brandmeister</strong> — largest global amateur DMR network</li>
<li><strong>DMR-MARC</strong> — North America focused</li>
<li><strong>TGIF</strong> — alternative, more open network</li>
<li>Talkgroups: <code>TG 91</code> (World English), <code>TG 93</code> (NA), regional/local TGs</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="dmr-hardware--getting-started">DMR: Hardware &amp; Getting Started</h2>
<h3 id="hardware-1">Hardware:</h3>
<ul>
<li><strong>TYT MD-380/390</strong> — ~$65, the original popular DMR HT</li>
<li><strong>Radioddity GD-73</strong> — compact, excellent value</li>
<li><strong>Anytone AT-D878UV</strong> — feature-packed, popular upgrade</li>
<li><strong>Hotspot</strong> — MMDVM or Pi-Star/BlueDV — connects to BrandMeister via Wi-Fi</li>
</ul>
<h3 id="getting-started-2">Getting started:</h3>
<ol>
<li>Buy a DMR radio</li>
<li>Register on <code>radioid.net</code> for your <strong>DMR ID</strong> (free)</li>
<li>Program local repeaters or set up a hotspot</li>
<li>Join Talkgroup 91 and say hello</li>
</ol>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="d-star--digital-smart-technologies-for-amateur-radio">D-STAR — Digital Smart Technologies for Amateur Radio</h2>
<p><strong>The original amateur digital voice system — pioneered by JARL and Icom.</strong></p>
<h3 id="history">History:</h3>
<ul>
<li>Developed by JARL (Japan Amateur Radio League), funded by MEXT</li>
<li>First deployed commercially by Icom in the mid-2000s</li>
<li>Open standard, but Icom dominates the hardware market</li>
</ul>
<h3 id="d-star-features">D-STAR features:</h3>
<ul>
<li><strong>AMBE+2</strong> codec (proprietary, but widely licensed)</li>
<li><strong>DV mode:</strong> voice + 1200 bps low-speed data simultaneously</li>
<li><strong>DD mode:</strong> 128 kbps digital data (rare, specialized hardware)</li>
<li>Callsign routing: <code>CQCQCQ</code> or specific callsigns across reflectors</li>
<li><strong>Reflectors:</strong> DCS, XRF, REF — link repeaters worldwide</li>
</ul>
</section>

<ul>

<ul>
<li>Excellent legacy infrastructure in many regions</li>
<li>Very active in Japan and Europe</li>
<li>Callsign-based routing feels natural to amateur operators</li>
<li>Works well with modest antennas and handheld power levels</li>
</ul>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="c4fm--yaesu-system-fusion">C4FM — Yaesu System Fusion</h2>
<p><strong>Yaesu's proprietary digital voice standard, with wide adoption.</strong></p>
<h3 id="what-is-c4fm">What is C4FM?</h3>
<ul>
<li><strong>C4FM</strong> = Continuous 4-level FM — the modulation scheme</li>
<li>Yaesu's brand name: <strong>System Fusion</strong></li>
<li><strong>AMBE+2</strong> codec (same as D-STAR)</li>
<li>Many C4FM repeaters run in <strong>auto mode</strong> — accepts both analog FM and digital</li>
</ul>
<h3 id="wires-x-network">WIRES-X Network:</h3>
<ul>
<li>Yaesu's internet-linking platform</li>
<li><strong>Rooms and Nodes</strong> — similar to Echolink but C4FM native</li>
<li>Thousands of rooms worldwide, many active communities</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="c4fm-why-it-works">C4FM: Why It Works</h2>
<h3 id="why-operators-like-c4fm">Why operators like C4FM:</h3>
<ul>
<li>Seamless analog/digital coexistence on same repeater</li>
<li>Good audio quality with no extra setup for analog users</li>
<li>WIRES-X rooms are easy to navigate directly from the radio</li>
<li>Yaesu makes excellent radios: <strong>FT-70D</strong> (~$180), FT3DR, FTM-500D</li>
</ul>
<h3 id="c4fm-in-2026">C4FM in 2026:</h3>
<ul>
<li>Very active in North America, Japan, and Europe</li>
<li>Compatible with <strong>YSF</strong> reflectors via Pi-Star/BlueDV hotspots</li>
<li>Great entry point if your local club runs a Fusion repeater</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="m-17--the-open-standard">M-17 — The Open Standard</h2>
<p><strong>The newest digital voice mode — and the most philosophically pure.</strong></p>
<h3 id="the-problem-m-17-solves">The problem M-17 solves:</h3>
<blockquote>
<p>&quot;Every major digital voice mode (DMR, D-STAR, C4FM) uses<br />
AMBE — a <strong>proprietary, patented, expensive</strong> codec.<br />
Amateur radio should use <em>open</em> technology.&quot;<br />
— M-17 Project</p>
</blockquote>
<h3 id="what-m-17-does-differently">What M-17 does differently:</h3>
<ul>
<li>Uses <strong>Codec2</strong> — fully open source, originally by David Rowe VK5DGR</li>
<li><strong>Open standard</strong> — fully documented, no licensing fees</li>
<li>Designed specifically for amateur radio (not a commercial repurpose)</li>
<li><strong>Software-defined radio friendly</strong> — can run in software</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ardc--amateur-radio-digital-communications">ARDC — Amateur Radio Digital Communications</h2>
<p><strong>The most important funding organization in amateur radio.</strong></p>
<h3 id="background">Background:</h3>
<ul>
<li>Founded to steward <code>44.0.0.0/8</code> — the <strong>AMPRNet</strong> IP block
<ul>
<li>A /8 (16.7 million addresses) allocated to amateur radio in the 1980s</li>
<li><strong>Sold a portion for $132 million</strong> in 2021 — funds the foundation</li>
</ul>
</li>
<li>Nonprofit — mission: support amateur radio and digital communications</li>
</ul>
<h3 id="what-ardc-funds">What ARDC funds:</h3>
<ul>
<li>Open source projects: <strong>OpenWebRX, Codec2, WSJT-X</strong> development</li>
<li>Infrastructure: repeaters, mesh networks, SDR receivers</li>
<li><strong>Education:</strong> scholarships, school programs</li>
<li><strong>Research:</strong> RF propagation, digital communications, emergency comms</li>
<li>Grants to clubs and individuals — <code>ardc.net/grants</code></li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="the-broader-community">The Broader Community</h2>
<h3 id="the-arrl-american-radio-relay-league">The ARRL (American Radio Relay League):</h3>
<ul>
<li>Largest amateur radio organization in the US</li>
<li>Publishes <strong>QST</strong> magazine, the ARRL Handbook</li>
<li>Administers VE (Volunteer Examiner) testing</li>
<li>Lobbies FCC on behalf of amateur radio</li>
<li><code>arrl.org</code> — find local clubs, events, resources</li>
</ul>
<h3 id="local-clubs">Local clubs:</h3>
<ul>
<li>Every region has multiple clubs — find yours at <code>arrl.org/find-a-club</code></li>
<li>Club activities: <strong>nets, meetings, Field Day, licensing classes, elmers</strong></li>
<li>Many clubs have loaner equipment for new members</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="pota--parks-on-the-air">POTA — Parks on the Air</h2>
<p><strong>The fastest-growing activity in amateur radio.</strong></p>
<h3 id="what-is-pota">What is POTA?</h3>
<ul>
<li>Activate <strong>national parks, forests, recreation areas</strong> with a portable radio station</li>
<li>A structured <strong>award program</strong> with an active logging community</li>
<li><strong>Activators</strong> (field operators) earn awards; <strong>Hunters</strong> (home operators) log contacts</li>
<li>Over <strong>50,000 parks</strong> across <strong>80+ countries</strong> in the program</li>
</ul>
<h3 id="why-pota-is-amazing">Why POTA is amazing:</h3>
<ul>
<li>Forces you to <strong>operate portable</strong> — builds real skills</li>
<li>Gets you outside in beautiful places with a purpose</li>
<li>Deeply social — huge community at <code>parksontheair.com</code></li>
<li><strong>Any license class can participate</strong> — Technicians operate 2m POTA!</li>
<li>Award certificates for activations and hunter contacts</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="pota-how-to-activate">POTA: How to Activate</h2>
<h3 id="what-a-pota-activation-looks-like">What a POTA activation looks like:</h3>
<ol>
<li>Choose a qualifying park (<code>parksontheair.com/reference</code>)</li>
<li>Set up portable radio + antenna (often a wire in a tree)</li>
<li>Make <strong>10 contacts minimum</strong> to count as an activation</li>
<li>Upload log to POTA website within 24 hours</li>
<li>Repeat — some operators activate 100s of parks per year</li>
</ol>
<blockquote>
<p>POTA turned &quot;going to the park&quot; into a global radio adventure.</p>
</blockquote>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="pota-getting-started">POTA: Getting Started</h2>
<h3 id="minimum-gear-for-a-pota-activation">Minimum gear for a POTA activation:</h3>
<p><strong>VHF/UHF (Technician):</strong></p>
<ul>
<li>Handheld radio (Yaesu FT-65, etc.)</li>
<li>Extra batteries or portable power bank</li>
<li>Find a local 2m repeater in the park coverage area</li>
<li>Make 10 contacts on the repeater — done!</li>
</ul>
<p><strong>HF (General+):</strong></p>
<ul>
<li>Portable HF radio: <strong>Xiegu X6100</strong> ($500), <strong>Icom IC-705</strong> ($1,300), <strong>uSDX</strong> ($60 kit!)</li>
<li>Wire antenna: end-fed half-wave (EFHW) is popular, 66 ft of wire + 9:1 unun</li>
<li>Fishing pole or tree branch as antenna support</li>
<li><strong>20m is the POTA band</strong> — most activity, best for new activators</li>
</ul>
<h3 id="the-pota-culture">The POTA culture:</h3>
<ul>
<li><strong>No logging while driving</strong> — always set up safely</li>
<li><strong>Spot yourself</strong> on <code>pota.app</code> so hunters know you're active</li>
<li>The community is <em>extremely</em> welcoming to new activators</li>
<li>Many clubs organize <strong>group activations</strong> — great for beginners</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ares--amateur-radio-emergency-service">ARES — Amateur Radio Emergency Service</h2>
<p><strong>When it matters most, ARES is there.</strong></p>
<h3 id="what-is-ares">What is ARES?</h3>
<ul>
<li><strong>ARRL-affiliated</strong> volunteer emergency communications organization</li>
<li>Coordinates amateur radio support during <strong>disasters and emergencies</strong></li>
<li>Works with: FEMA, Red Cross, local emergency management, hospitals</li>
<li>Organized at county and state level — find your local group at <code>arrl.org/ares</code></li>
</ul>
<h3 id="what-ares-operators-do">What ARES operators do:</h3>
<ul>
<li><strong>Staffing EOCs</strong> (Emergency Operations Centers) during disasters</li>
<li><strong>Health and welfare traffic</strong> — connecting families during evacuations</li>
<li><strong>Backup communications</strong> when cell/internet infrastructure fails</li>
<li><strong>Shelter registration</strong> — radio links between shelters</li>
<li><strong>Spotting for NWS</strong> — severe weather reporting (SKYWARN)</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="ares-training--technology">ARES: Training &amp; Technology</h2>
<h3 id="training-required">Training required:</h3>
<ul>
<li><strong>ICS 100 and 700</strong> — free FEMA online courses (required by most groups)</li>
<li><strong>ARRL EC-001</strong> — Introduction to Emergency Communications</li>
<li>Regular <strong>training nets</strong> and tabletop exercises</li>
<li>Annual <strong>Simulated Emergency Test (SET)</strong></li>
</ul>
<h3 id="technology-ares-uses">Technology ARES uses:</h3>
<ul>
<li>FM voice on 2m/70cm — the reliable backbone</li>
<li><strong>Winlink/VARA</strong> — radio email for formal message traffic</li>
<li><strong>APRS</strong> — situational awareness and resource tracking</li>
<li><strong>MESH/AREDN</strong> — IP networking over radio for large incidents</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="field-day">Field Day</h2>
<p><strong>The Super Bowl of Amateur Radio.</strong></p>
<h3 id="what-is-field-day">What is Field Day?</h3>
<ul>
<li>Annual event held the <strong>last full weekend of June</strong></li>
<li>Organized by ARRL — over <strong>40,000 operators</strong> participate nationwide</li>
<li>Clubs set up portable stations <strong>without normal power infrastructure</strong></li>
<li>Make as many contacts as possible in <strong>24 hours</strong></li>
<li>Part contest, part training exercise, part social event</li>
</ul>
<h3 id="how-field-day-works">How Field Day works:</h3>
<ul>
<li><strong>Classes:</strong> 1A (1 transmitter, remote), 2A (2 TX), Club class, etc.</li>
<li><strong>Categories:</strong> HF, VHF, satellite, digital</li>
<li>Bonus points for: emergency power, public info, media coverage, satellite contacts</li>
<li>Score submitted to ARRL — results published in QST magazine</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="more-activities-contesting--sota">More Activities: Contesting &amp; SOTA</h2>
<h3 id="contesting">Contesting:</h3>
<ul>
<li><strong>CQ WW, ARRL DX, 7QP</strong> — hundreds of contests per year</li>
<li>Competitive contact-making across bands and modes</li>
<li><code>contestcalendar.com</code> — full schedule</li>
<li>Even one hour in a contest teaches more than a month of casual operating</li>
</ul>
<h3 id="sota--summits-on-the-air">SOTA — Summits on the Air:</h3>
<ul>
<li>Similar to POTA but specifically for <strong>mountain summits</strong></li>
<li>Must operate within 25 vertical meters of the summit</li>
<li>Serious portable operating — often QRP with tiny antennas</li>
<li>Global program: <code>sota.org.uk</code></li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="more-activities-satellites--weak-signal">More Activities: Satellites &amp; Weak Signal</h2>
<h3 id="satellite-operation">Satellite Operation:</h3>
<ul>
<li>Amateur satellites in orbit: <strong>SO-50, AO-91, AO-92, ISS</strong></li>
<li>Technician can work satellites with a dual-band handheld + yagi</li>
<li>ISS occasionally schedules <strong>SSTV events</strong> — receive space images</li>
<li><code>amsat.org</code> — satellite tracking, schedules, and getting started</li>
</ul>
<h3 id="digital-weak-signal-wsjt-x-modes">Digital Weak Signal (WSJT-X Modes):</h3>
<ul>
<li><strong>EME (Earth-Moon-Earth)</strong> — bounce signals off the moon</li>
<li><strong>Meteor Scatter</strong> — use meteor trails as radio reflectors</li>
<li><strong>Troposcatter</strong> — ducting contacts 1000+ km on VHF/UHF</li>
</ul>
<blockquote>
<p>VHF/UHF contesting, Hamvention, public service events...<br />
There is <em>always</em> something to do in amateur radio. Always.</p>
</blockquote>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="the-starter-playbook">The Starter Playbook</h2>
<p><strong>Concrete steps you can take this week:</strong></p>
<h3 id="week-1--start-listening">Week 1 — Start listening:</h3>
<ul>
<li>[ ] Order an <strong>RTL-SDR Blog V4</strong> kit (~$35) from <code>rtl-sdr.com</code></li>
<li>[ ] Download <strong>SDR++</strong> and install it</li>
<li>[ ] Tune to 144.390 MHz and watch APRS packets scroll by</li>
<li>[ ] Find a local 2m repeater and listen to actual conversations</li>
</ul>
<h3 id="week-2--get-unlicensed-on-the-air">Week 2 — Get unlicensed on the air:</h3>
<ul>
<li>[ ] Buy a set of <strong>FRS radios</strong> or order a <strong>LoRa board</strong> for MeshCore/Meshtastic</li>
<li>[ ] Try MeshCore with a friend — experience real off-grid comms</li>
<li>[ ] Consider whether <strong>GMRS</strong> fits your household needs ($35, no exam)</li>
</ul>
<h3 id="week-3%E2%80%934--study-for-your-technician">Week 3–4 — Study for your Technician:</h3>
<ul>
<li>[ ] Create a free account at <strong>HamStudy.org</strong></li>
<li>[ ] 15–30 minutes per day of flashcard practice</li>
<li>[ ] Schedule your exam when you're consistently passing at 80%+</li>
</ul>
</section>

<header>Getting Started in HAM Radio — 2026</header>
<h2 id="after-youre-licensed">After You're Licensed</h2>
<h3 id="first-month-on-the-air">First month on the air:</h3>
<ul>
<li>[ ] Find a local club — attend a meeting</li>
<li>[ ] Get on 2m FM — make your first repeater contact</li>
<li>[ ] Go to a <strong>Field Day</strong> — even just as an observer</li>
<li>[ ] Explore POTA — Technicians can activate on 2m FM</li>
</ul>
<h3 id="keep-progressing">Keep progressing:</h3>
<ul>
<li>[ ] Study for <strong>General</strong> — unlock HF and global contacts</li>
<li>[ ] Set up a <strong>Winlink</strong> station for emergency preparedness</li>
<li>[ ] Try a <strong>DMR hotspot</strong> — talk to the world from your desk</li>
<li>[ ] Attend <strong>Hamvention</strong> or a regional hamfest</li>
</ul>
<blockquote>
<p>The hardest part is making that first contact.<br />
After that, you'll never want to stop.</p>
</blockquote>
